<!DOCTYPE html>
<html lang="es-AR" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#e06f2b" />
  <title>Página no encontrada | Viento Sur Materiales</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
  <link rel="icon" type="image/x-icon" href="favicon.ico" />
  <link rel="shortcut icon" type="image/x-icon" href="favicon.ico" />
  <link rel="icon" type="image/png" sizes="32x32" href="assets/images/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="assets/images/favicon-16x16.png" />
  <link rel="apple-touch-icon" href="assets/images/favicon.png" />
  <link rel="stylesheet" href="css/styles.css" />
  <style>
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .animate-fade-in { opacity: 0; animation: fadeInUp 0.6s cubic-bezier(0.16,1,0.3,1) forwards; }
  </style>
</head>
<body>

  <!-- ══ TOPBAR ══ -->
  <div style="background:var(--primary); padding:8px 0; font-size:0.75rem; font-weight:500; color:rgba(255,255,255,0.9);">
    <div class="container" style="display:flex; justify-content:center; align-items:center;">
      <span>Viento Sur Materiales — Paso de Indios, Chubut</span>
    </div>
  </div>

  <!-- ══ NAVBAR ══ -->
  <header id="navbar" class="nav-header" role="navigation" aria-label="Navegación principal">
    <div class="container" style="display:flex; align-items:center; justify-content:space-between; height:90px;" id="nav-container">
      <a href="index.html" aria-label="Viento Sur Materiales — Inicio" style="display:flex; align-items:center;">
        <img src="assets/images/logo.png" alt="Viento Sur Materiales" class="nav-logo">
      </a>
      <a href="index.html" class="btn btn-outline" style="height:36px; padding:0 1rem; font-size:0.8125rem;">
        Ir al Inicio
      </a>
    </div>
  </header>

  <main style="min-height:70vh; display:flex; align-items:center; justify-content:center;">
    <div class="container" style="text-align:center; max-width:480px; padding:3rem 1.5rem;">
      <div class="animate-fade-in" style="display:flex; flex-direction:column; gap:1.5rem; align-items:center;">
        
        <!-- Big iOS Warning Icon -->
        <div style="width:80px; height:80px; border-radius:50%; background:var(--amber-tint); display:flex; align-items:center; justify-content:center; color:var(--primary); margin-bottom:1rem; border:1px solid rgba(224,111,43,0.25);">
          <i data-lucide="compass" style="width:40px; height:40px;" aria-hidden="true"></i>
        </div>

        <h1 style="font-size:4rem; font-weight:900; color:var(--text-primary); margin:0; line-height:1; letter-spacing:-0.06em;">404</h1>
        
        <h2 style="font-size:1.5rem; font-weight:700; color:var(--text-primary); margin:0; letter-spacing:-0.03em;">Ruta no encontrada</h2>
        
        <p style="color:var(--text-secondary); line-height:1.65; margin:0;">
          La página que estás buscando no existe, ha sido movida o la dirección es incorrecta.
        </p>

        <div style="margin-top:1.5rem; display:flex; gap:0.75rem; flex-wrap:wrap; justify-content:center;">
          <a href="index.html" class="btn btn-accent">
            <i data-lucide="home" style="width:16px; height:16px;"></i>
            Volver al Inicio
          </a>
          <a href="index.html#contacto" class="btn btn-outline">
            <i data-lucide="mail" style="width:16px; height:16px;"></i>
            Soporte Técnico
          </a>
        </div>

      </div>
    </div>
  </main>

  <!-- ══ FOOTER ══ -->
  <footer role="contentinfo" style="border-top:1px solid rgba(60,60,67,0.12); padding:2rem 0; background:var(--bg-secondary); text-align:center;">
    <p style="font-size:0.8125rem; color:var(--text-secondary); margin:0;">
      © 2026 Viento Sur Materiales. Todos los derechos reservados.
    </p>
  </footer>

  <script src="https://unpkg.com/lucide@latest"></script>
  <script>
    if (typeof lucide !== 'undefined') {
      lucide.createIcons();
    }
  </script>
</body>
</html>
